version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: railvera_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: railway_admin_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: railvera_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@db:5432/railway_admin_db
      - SECRET_KEY=supersecretjwtkeyforrailwayadminai1234!
      - OLLAMA_HOST=http://host.docker.internal:11434
    depends_on:
      - db
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/reports:/app/reports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: railvera_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
